name: Week 3 Demo Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'labs/week3/week3_demo.ipynb'
      - 'tests/test_week3_demo.py'
      - 'tests/notebook_utils.py'
      - '.github/workflows/week3-demo-tests.yml'
  push:
    paths:
      - 'labs/week3/week3_demo.ipynb'
      - 'tests/test_week3_demo.py'

jobs:
  test-week3-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Run Week 3 demo tests
        run: |
          pytest tests/test_week3_demo.py -v --tb=short

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Week 3 demo tests completed"
